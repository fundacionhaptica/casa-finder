# casa-finder — docker-compose
#
# Servicio `scraper`: CLI de un solo uso (no queda corriendo en background).
# Se invoca puntualmente o desde cron con:
#   docker compose run --rm scraper python -m scraper.run --only escapadarural --limit 5 --dry-run
#
# El volumen ./data:/app/data resuelve el gotcha de DEFAULT_DB_PATH
# (ver memoria del proyecto, sesion 3 2026-07-01): dentro de Docker
# /app/data siempre apunta al data/ real del repo, asi que no hace
# falta pasar --db a mano.
#
# Servicio `api`: FastAPI de solo lectura sobre la misma data/casas.db.
# Puerto host 8401 (reservado en /volume1/docker/PUERTOS.md). Docs en
# http://<nas>:8401/docs. Se expone tanto en publico (via Cloudflare,
# decision 2026-07-01) como internamente para el proxy de `web`.
#
# Servicio `web`: nginx + Alpine.js (paso 4, 2026-07-01). Sirve la web
# estatica y proxea /api/* hacia `api:8000` usando la red compartida
# `ia-net`. Puerto host 8400.
#
# Red `ia-net`: red bridge YA EXISTENTE en el NAS (usada tambien por
# vision-router, ver README). Se declara como `external: true` para
# NO crear una subred nueva -- el NAS aloja muchos proyectos compose y
# el pool de subredes por defecto de Docker se agota ("could not find
# an available, non-overlapping IPv4 address pool", detectado
# 2026-07-01). `scraper` no la necesita (solo hace HTTPS saliente) y
# sigue en `network_mode: bridge` como hasta ahora.
services:
  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    image: casa-finder-scraper:local
    network_mode: bridge
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Madrid
    # Sin ports: es un CLI, no expone servidor.
    # Sin restart: no debe quedar en loop, se invoca via `run --rm`.

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: casa-finder-api:local
    networks:
      - ia-net
    volumes:
      - ./data:/app/data
    ports:
      - "8401:8000"
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: casa-finder-web:local
    networks:
      - ia-net
    ports:
      - "8400:80"
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped
    depends_on:
      - api

networks:
  ia-net:
    external: true