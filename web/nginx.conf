# casa-finder — nginx (paso 4)
#
# Sirve la web estatica (Alpine.js, sin build step) y hace de proxy
# para /api/* hacia el servicio `api` (FastAPI) en la red compartida
# `ia-net` (ver docker-compose.yml). El navegador solo habla con este
# nginx: nunca llama directo al puerto 8401, asi que la API puede
# quedar sin exponer publicamente si en el futuro se decide asi
# (decision actual, 2026-07-01: la API SI se expone tambien en
# publico ademas de este proxy, pero el frontend usa el proxy).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy a la API. El slash final en location y en proxy_pass hace
    # que nginx sustituya el prefijo /api/ por / al reenviar, es decir
    # /api/listings -> http://api:8000/listings
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}